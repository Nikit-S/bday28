<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}" />
</head>
<body>
  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>🎉 {{ page.title | default: site.title }}</h1>
      <p class="hero-subtitle">{{ page.subtitle | default: site.description }}</p>
    </div>
  </section>

  <!-- Navigation -->
  <nav class="nav">
    <a href="#about">О празднике</a>
    <a href="#gifts">Подарки</a>
    <a href="#location">Место</a>
    <a href="#faq">FAQ</a>
  </nav>

  <!-- Main Content -->
  <main class="container">
    {{ content }}
  </main>

  <footer class="footer">
    <p>{{ page.footer | default: "Жду вас! 🎉" }}</p>
  </footer>

  <script src="{{ '/assets/script.js' | relative_url }}"></script>
</body>
</html>
